<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFOF-FUCKUP | PRAI HOME</title>
    
    <!-- Absolute Pfadierung zur Hardware-Quelle (QNET REGEL 1) -->
    <link rel="stylesheet" href="HARDWARE/SOFTWARE/backend/frontend/os-interface/desktop-styles.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --blur: 20px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            overflow: hidden;
        }

        /* Master-Dropdown (Apple Glassmorphism) */
        .nav-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .dropdown {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            border-radius: 40px;
            display: flex;
            gap: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .dropdown-item {
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.8;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .dropdown-item:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Sektoren-Grid (Home Content) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 100px 40px 40px;
            height: calc(100vh - 140px);
        }

        .sector-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding: 20px;
        }

        .sector-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .sector-id {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Sektor 9: rApp Center Full-Screen Layer */
        #rapp-center-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(30px);
            z-index: 2000;
            display: none;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 2100;
        }
    </style>
</head>
<body>

    <!-- Dynamisches 5+-Punkte-Dropdown -->
    <nav class="nav-container">
        <div class="dropdown">
            <a href="#" class="dropdown-item" onclick="closeCenter()">01 Home</a>
            <a href="#" class="dropdown-item" onclick="openCenter()">02 rApp Center</a>
            <a href="rAppCenter/X-Hub/index.html" class="dropdown-item">03 X-Hub</a>
            <a href="rAppCenter/PRAI/index.html" class="dropdown-item">04 PRAI App</a>
            <!-- Dynamische Projekte würden hier via JS injiziert -->
            <a href="#" class="dropdown-item" id="last-doc">Documentation</a>
        </div>
    </nav>

    <!-- Home: 8 Sektoren Grid -->
    <main class="grid-container">
        <div class="sector-card"><div class="sector-id">Sektor 1</div><h3>Axiome</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 2</div><h3>Logik</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 3</div><h3>GUICI</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 4</div><h3>QNET</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 5</div><h3>Crypto</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 6</div><h3>Science</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 7</div><h3>Analytics</h3></div>
        <div class="sector-card"><div class="sector-id">Sektor 8</div><h3>Config</h3></div>
    </main>

    <!-- Sektor 9 Projektor-Layer -->
    <iframe id="rapp-center-layer" src="rAppCenter/index.html"></iframe>
    <div id="close-center-btn" class="close-btn" style="display:none;" onclick="closeCenter()">&times;</div>

    <!-- Brücken-Logik (Validierung) -->
    <script src="HARDWARE/SOFTWARE/backend/frontend/logic/event-bridge.js"></script>
    <script src="HARDWARE/SOFTWARE/backend/frontend/logic/data-binder.js"></script>

    <script>
        function openCenter() {
            document.getElementById('rapp-center-layer').style.display = 'block';
            document.getElementById('close-center-btn').style.display = 'block';
        }

        function closeCenter() {
            document.getElementById('rapp-center-layer').style.display = 'none';
            document.getElementById('close-center-btn').style.display = 'none';
        }

        // Deterministische Dokumentations-Koppelung (Master-Index 00)
        document.getElementById('last-doc').addEventListener('click', () => {
            // Logik zum Aufruf des Aggregators
            console.log("Lade Master-Index 00...");
        });
    </script>
</body>
</html>
